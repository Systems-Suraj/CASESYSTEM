<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CASE SYSTEM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CDN (ok for now) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- HEADER -->
  <div class="bg-blue-600 text-white p-4 text-lg font-semibold shadow">
    CASE SYSTEM
  </div>

  <!-- MAIN -->
  <div class="p-4 max-w-3xl mx-auto">

    <!-- ACTION BAR -->
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-bold">Cases</h2>

      <button onclick="loadCases()" 
        class="bg-blue-500 text-white px-4 py-2 rounded">
        Refresh
      </button>
    </div>

    <!-- CASE LIST -->
    <div id="caseList" class="space-y-3"></div>

  </div>

  <!-- SCRIPT -->
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzrKy8Ug6VyeDTvz5DcENn2rhqwKYnpfNkXjdHfzFKxVVKAHQ8JJxXSVpZgDyaRoooO/exec";

    async function loadCases() {
      const container = document.getElementById("caseList");
      container.innerHTML = "Loading...";

      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        // safety check
        if (!data || !data.cases) {
          container.innerHTML = "No data found";
          return;
        }

        container.innerHTML = "";

        data.cases.forEach(c => {
          const div = document.createElement("div");

          div.className = "bg-white p-4 rounded shadow";

          div.innerHTML = `
            <div class="font-semibold">${c.title || "No Title"}</div>
            <div class="text-sm text-gray-600">${c.description || ""}</div>
            <div class="text-xs text-gray-400 mt-2">${c.status || ""}</div>
          `;

          container.appendChild(div);
        });

      } catch (err) {
        container.innerHTML = "Error loading cases ❌";
        console.error(err);
      }
    }

    // Auto load
    loadCases();
  </script>

</body>
</html>
