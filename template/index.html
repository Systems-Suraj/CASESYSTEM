<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind (ok for now) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4">

  <div class="max-w-xl mx-auto bg-white p-4 rounded shadow">
    <h1 class="text-xl font-bold mb-4">My Web App</h1>

    <button onclick="loadData()" 
      class="bg-blue-500 text-white px-4 py-2 rounded">
      Load Data
    </button>

    <pre id="output" class="mt-4 text-sm bg-gray-200 p-2 rounded"></pre>
  </div>

  <script>
    async function loadData() {
      try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbz6Edq9MAo02PwdnLHHvi5IOhDlk68gJRqm4bDzGGpQkLctavS9a65EaXEyoqgP8Pi9gw/exec");
        
        const data = await res.json();

        document.getElementById("output").innerText = JSON.stringify(data, null, 2);

      } catch (err) {
        document.getElementById("output").innerText = "Error: " + err;
      }
    }
  </script>

</body>
</html>
